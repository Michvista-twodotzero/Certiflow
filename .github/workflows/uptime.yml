name: Uptime Check

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping API health
        run: curl -fsS https://api-gateway-production-c30b.up.railway.app/health

      - name: Ping frontend
        run: curl -fsS https://frontend-production-da3b.up.railway.app
